<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Collections Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-900 font-sans">
    <nav class="bg-blue-900 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <a href="{% url 'dashboard' %}" class="text-xl font-bold">Collections Optimizer AI</a>
            <div class="flex items-center gap-4">
                {% if user.is_authenticated %}
                <span class="text-sm opacity-90">
                    {{ user.get_full_name|default:user.username }}
                </span>
                {% if user.profile.role == 'supervisor' %}
                <span class="bg-yellow-500 text-yellow-900 text-xs font-bold px-2 py-0.5 rounded">Supervisor</span>
                {% else %}
                <span class="bg-blue-400 text-blue-900 text-xs font-bold px-2 py-0.5 rounded">Agent</span>
                {% endif %}
                <a href="{% url 'logout' %}"
                    class="text-sm bg-blue-800 hover:bg-blue-700 px-3 py-1 rounded transition-colors">
                    Logout
                </a>
                {% else %}
                <span class="text-sm opacity-80"></span>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="container mx-auto p-6">
        {% block content %}{% endblock %}
    </main>
</body>

</html>
